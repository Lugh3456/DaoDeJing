<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 53</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 53</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
使我介然有知，行於大道，唯施是畏。大道甚夷，而民好徑。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>使我介然有知</strong></p>
<p class="explanation">使我心中有明辨的知識與警覺，明白如何行事。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>行於大道，唯施是畏</strong></p>
<p class="explanation">行於大道之時，要慎重而敬畏，保持謙卑與謹慎。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>大道甚夷，而民好徑</strong></p>
<p class="explanation">大道本來平坦易行，但百姓偏好捷徑，追求便利而偏離正道。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第五十三章告訴我們大道雖平坦，行道之人仍需謹慎敬畏，而普通人往往偏好捷徑。提醒我們堅守正道，不隨波逐流，保持清醒的智慧。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
