<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 31</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 31</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
兵者不祥之器，非君子之器。不得已而用之，恬淡為上，勝而不美。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>兵者不祥之器，非君子之器</strong></p>
<p class="explanation">兵器是不吉祥的工具，不應是君子用來彰顯力量或地位的物品。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>不得已而用之</strong></p>
<p class="explanation">只有在不得已的情況下，才可以使用兵器，避免濫用暴力。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>恬淡為上，勝而不美</strong></p>
<p class="explanation">最好的態度是平和淡然，即使勝利，也不炫耀與誇美。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第三十一章提醒人們慎用兵器與權力。兵器非君子所用，應避免濫用，保持恬淡和平的心態，即便取得勝利，也不自誇。順應道的智慧是以柔克剛、慎重行事。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
