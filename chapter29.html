<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 29</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 29</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
將欲取天下而為之，吾見其不得已。天下神器，不可為也；為者敗之，執者失之。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>將欲取天下而為之，吾見其不得已</strong></p>
<p class="explanation">想要掌控天下的人，最終必然會面臨困境和阻力，不可強行干涉。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>天下神器，不可為也</strong></p>
<p class="explanation">天下的重要之物如同神聖之器，不可任意操作或控制。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>為者敗之，執者失之</strong></p>
<p class="explanation">試圖掌控和執著的人，最終會導致失敗或失去本身之物。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第二十九章提醒我們不要強行掌控事物或權力。順應自然，不執著、不干涉，反而能保持穩定與長久。凡事順其自然，過度干預只會導致損失與失敗。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
