<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 19</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 19</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
絕聖棄智，民利百倍；絕仁棄義，民復孝慈；絕巧棄利，盜賊無有。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>絕聖棄智，民利百倍</strong></p>
<p class="explanation">放下聖賢的聰明與過度智巧，百姓反而能獲得更多實際利益，社會更自然。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>絕仁棄義，民復孝慈</strong></p>
<p class="explanation">棄掉過度形式化的仁義，百姓自然而然恢復真誠的孝與慈愛。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>絕巧棄利，盜賊無有</strong></p>
<p class="explanation">放棄過度計較與利己的心態，社會就不會出現盜賊和搶奪。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第十九章強調回歸純樸與自然。過度聰明、形式化的仁義或逐利，反而會帶來社會問題。當人們回歸簡單、真誠與自然，社會和諧，百姓安居樂業。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
