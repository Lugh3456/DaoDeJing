<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 41</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 41</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
上士聞道，勤而行之；中士聞道，若存若亡；下士聞道，大笑之，不笑不足以為道。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>上士聞道，勤而行之</strong></p>
<p class="explanation">高明的人聽到道的真理後，會努力實踐，將智慧落到行動中。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>中士聞道，若存若亡</strong></p>
<p class="explanation">中等的人聽到道，心中時而明白時而模糊，理解不深。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>下士聞道，大笑之，不笑不足以為道</strong></p>
<p class="explanation">低層次的人聽到道，覺得可笑而不以為真，但道的深奧非笑不足以表現其玄妙。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第四十一章說明不同層次的人對道的理解與態度。高者實踐，中者模糊，低者笑而不信。這提醒我們，道的理解需要實踐和體驗，而非單純的表面知識。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
