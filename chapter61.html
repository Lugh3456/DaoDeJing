<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 61</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 61</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
大國者下流。天下之交，交而不爭。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>大國者下流</strong></p>
<p class="explanation">大國應如水般處於低位，不爭先，包容萬物，方能長治久安。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>天下之交，交而不爭</strong></p>
<p class="explanation">國與國之間應互動交流但不爭奪，以和平、包容和智慧處理關係。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第六十一章告訴我們大國應謙下如水，與其他國家交往不爭，包容而穩健。這提醒我們在國家治理及人際交往中，謙遜與和平的重要性。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
