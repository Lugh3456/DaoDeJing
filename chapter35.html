<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 35</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 35</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
大道常無形，樸雖小，天下莫能臣也。侯王若能守之，萬物將自化。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>大道常無形</strong></p>
<p class="explanation">大道本身無形無象，無法被具體表達，但存在於萬物之中。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>樸雖小，天下莫能臣也</strong></p>
<p class="explanation">雖然大道看似樸素微小，但它的影響深遠，世人難以完全掌控。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>侯王若能守之，萬物將自化</strong></p>
<p class="explanation">如果君王能順應大道而不妄為，天下萬物自然會和諧運行，各得其所。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第三十五章強調大道雖無形，影響卻無處不在。君王若能順應大道而不干涉，自然界與人事都會達到和諧。這教導我們在治理或生活中應以柔克剛，尊重自然規律。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
