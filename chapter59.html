<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 59</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 59</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
治人事天，莫若啟民之智；民智啟而知足，知足而強。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>治人事天，莫若啟民之智</strong></p>
<p class="explanation">治理國家與處理天下事，最好是啟發人民智慧，使他們自覺行事。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>民智啟而知足</strong></p>
<p class="explanation">當人民智慧被啟發，他們懂得知足，不會過度貪求與紛爭。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>知足而強</strong></p>
<p class="explanation">知足的人心態穩定、生活安和，也因此更加堅強有力。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第五十九章說明治理的智慧在於啟發人民智慧，使他們懂得知足，從而心態安定、生活平和。知足的人不受外界干擾，內心堅強，社會自然穩定。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
