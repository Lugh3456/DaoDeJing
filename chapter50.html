<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 50</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 50</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
出生入死。生之徒十有三，死之徒十有三。人之生也柔弱，其死也堅強。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>出生入死</strong></p>
<p class="explanation">人生從出生到死亡，自然循環不息。提醒我們生命有限且珍貴。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>生之徒十有三，死之徒十有三</strong></p>
<p class="explanation">古人統計生死比例，表明生與死是生命的常態與規律。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>人之生也柔弱，其死也堅強</strong></p>
<p class="explanation">人活著時柔弱脆弱，死亡後反而穩定堅固，形象地說明生命的脆弱與終極不可抗。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第五十章說明生命的循環：生死皆是自然之道。人活著時軟弱無力，死亡後則堅固不變。理解這一點，我們應珍惜當下，順應自然，不強求，認識生命的脆弱與力量。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
