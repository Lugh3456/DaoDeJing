<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 51</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 51</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
道生之，德畜之。物形之，勢成之。是以萬物尊道而貴德。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>道生之</strong></p>
<p class="explanation">萬物因道而生，道是根本的創造力量。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>德畜之</strong></p>
<p class="explanation">道所生之物，由德養育和培育，保持其生命與運行。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>物形之，勢成之</strong></p>
<p class="explanation">萬物有形體，由道的力量形成，依勢而生長和運作。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>是以萬物尊道而貴德</strong></p>
<p class="explanation">因此萬物崇尚道、重視德，這是自然運行和生命和諧的根本。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第五十一章說明道和德的關係：道是創造萬物的根源，德則養育和維持萬物。萬物順應道而生、依德而行，這教導我們理解自然法則，尊道貴德，保持內在與外在的和諧。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
