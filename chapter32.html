<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 32</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 32</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
道常無名，樸雖小，天下莫能臣也。侯王若能守之，萬物將自化。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>道常無名</strong></p>
<p class="explanation">道本身沒有固定名稱，它超越言語和概念。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>樸雖小，天下莫能臣也</strong></p>
<p class="explanation">雖然樸素和簡單，但它的力量深遠，世人難以完全掌控或征服。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>侯王若能守之，萬物將自化</strong></p>
<p class="explanation">如果君王能遵循道而不干預萬物，天下萬物自然會和諧運行、各得其所。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第三十二章強調“道”無形而無名，其影響深遠。君王若能順應道，不強制干預，自然界與萬物都會自我調整、各安其位。道是萬物運行的根本法則。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
