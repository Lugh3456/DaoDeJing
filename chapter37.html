<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 37</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 37</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
道常無名，樸雖小，天下莫能臣也。侯王若能守之，萬物將自化。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>道常無名</strong></p>
<p class="explanation">大道沒有固定名稱，它存在於萬物之中，超越言語表達。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>樸雖小，天下莫能臣也</strong></p>
<p class="explanation">大道雖簡單樸素，其影響力深遠，世人難以完全掌控。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>侯王若能守之，萬物將自化</strong></p>
<p class="explanation">若君王順應大道而不干預，天下萬物會自然和諧運行，無需強制。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第三十七章強調順應大道的重要性。大道無名而深遠，君王若能守道而無為干預，自然界和人事都會達到平衡與和諧。智慧在於不強制，而是順勢而行。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
