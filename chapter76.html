<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 76</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 76</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
人之生也柔弱，其死也堅強。草木之生也柔脆，其死也枯槁。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>人之生也柔弱，其死也堅強</strong></p>
<p class="explanation">人生來柔弱脆弱，但死亡後化為堅硬之物，比喻生命的柔順與自然規律。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>草木之生也柔脆，其死也枯槁</strong></p>
<p class="explanation">草木生長時柔軟，死亡後枯乾硬化，說明柔弱乃自然之本。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第七十六章以生命與自然為例，提醒我們柔弱是生命的本質，強硬是死亡的結果。順應自然、謙下柔和，才可長久存續與生生不息。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
