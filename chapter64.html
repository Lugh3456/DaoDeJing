<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 64</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 64</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
合抱之木，生於毫末；九層之臺，起於累土；千里之行，始於足下。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>合抱之木，生於毫末</strong></p>
<p class="explanation">大樹能合抱，但它的生長始於最微小的萌芽，提醒我們萬物皆由細微開始。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>九層之臺，起於累土</strong></p>
<p class="explanation">高樓層疊而成，但每層都是一點一滴累積起來的，強調積少成多。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>千里之行，始於足下</strong></p>
<p class="explanation">再長的旅程，也要從踏出第一步開始，任何偉大事物都需從基礎做起。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第六十四章教導我們任何偉大的事物都從微小開始。無論是成長、建設還是修行，都要從最基礎的細節做起，耐心積累，方能達成遠大目標。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
