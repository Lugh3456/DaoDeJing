<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dao De Jing - Chapter 6</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
  <h1>Chapter 6</h1>
  <a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
  <p id="chineseText">
    谷神不死，是為玄牝。玄牝之門，是為天地根。綿綿若存，用之不勤。
  </p>
  <button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
    🔊 誦讀全文
  </button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
  <p class="line"><strong>谷神不死，是為玄牝</strong></p>
  <p class="explanation">谷神指自然的力量與生命源泉，它永不消失，被稱作“玄妙的陰門”，象徵生命和滋養的源頭。</p>
</div>

<div class="explanation-card">
  <p class="line"><strong>玄牝之門，是為天地根</strong></p>
  <p class="explanation">這個神秘的門是天地萬物的根本所在，一切生命都源自此處。</p>
</div>

<div class="explanation-card">
  <p class="line"><strong>綿綿若存，用之不勤</strong></p>
  <p class="explanation">這股力量永續不斷，即使不費力使用，它也一直存在，滋養萬物。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第六章描述“道”如同谷神與玄牝，是天地萬物的生命源泉。它持續供應萬物而不枯竭，提醒我們萬物生長和宇宙運行都源自一個深遠而永續的力量。理解這一點，有助於領會“道”無為而不竭的特質。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
