<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 75</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 75</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
民之饑，以其上食稅之多；民之難治，以其上之奢。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>民之饑，以其上食稅之多</strong></p>
<p class="explanation">百姓饑餓，是因為統治者過度徵稅，搶走了他們的資源。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>民之難治，以其上之奢</strong></p>
<p class="explanation">百姓難以治理，是因為上層官員和貴族奢華浪費，造成社會不公平與不安定。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第七十五章指出社會問題的根源在於統治者的貪婪與奢侈。百姓困苦、難以治理，最終都是上層失衡所致。治理之道在於簡樸與公平。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
