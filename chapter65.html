<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 65</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 65</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
古之善為道者，非以明民，將以愚之。民之難治，以其智多。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>古之善為道者，非以明民，將以愚之</strong></p>
<p class="explanation">古代懂道的人治理國家，不是想讓人民過度明智，而是引導他們保持簡單樸素，避免複雜與爭鬥。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>民之難治，以其智多</strong></p>
<p class="explanation">民眾難以治理，是因為他們過於聰明、好辯，容易產生糾紛與矛盾。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第六十五章指出治理的智慧在於引導民眾簡單樸素。過於聰明與複雜反而造成社會難以管理。古人以道為法，讓人民順應自然，安和而無爭。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
