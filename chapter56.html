<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 56</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 56</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
知者不言，言者不知。塞其兑，閉其門，挫其銳，解其紛，和其光，同其塵。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>知者不言，言者不知</strong></p>
<p class="explanation">真正智慧的人不隨意多言，而凡事喜說的人可能缺乏深度理解。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>塞其兑，閉其門</strong></p>
<p class="explanation">隱藏內在寶貴之物，不讓外界干擾，保持內心的穩定與完整。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>挫其銳，解其紛</strong></p>
<p class="explanation">削弱過於鋒利的力量，消解紛爭和混亂，使事物回歸平和。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>和其光，同其塵</strong></p>
<p class="explanation">隱藏鋒芒，與平凡同在，與世無爭，保持謙卑自然。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第五十六章提醒我們智慧應內斂，懂得收斂鋒芒，化解紛爭，順應自然。真正的力量在於謙和，隱於日常生活中而非炫耀。學會守靜、隱晦，才是長久之道。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
