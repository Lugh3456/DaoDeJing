<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 36</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 36</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
將欲厚生而薄殺人者，我見其未利。善為士者，不武而威，不以殺人而威。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>將欲厚生而薄殺人者，我見其未利</strong></p>
<p class="explanation">那些希望促進生命、減少傷害的人，我認為還未得到最佳利益，但方向正確。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>善為士者，不武而威</strong></p>
<p class="explanation">真正有智慧的領導者，不需依靠武力也能令人敬畏。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>不以殺人而威</strong></p>
<p class="explanation">他們不靠傷害他人來取得威望，而是以德行和智慧取信於人。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第三十六章提醒我們，統治與影響力應建立在尊重生命與道德之上，而非依靠武力或傷害。真正的威望來自智慧、德行和無為而治，而不是恐懼和壓迫。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
