<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 67</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 67</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
我有三寶，持而保之：一曰慈，二曰儉，三曰不敢為天下先。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>我有三寶，持而保之</strong></p>
<p class="explanation">我有三個寶貴之道，應當珍惜並遵守，以保護自己與他人的和諧。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>一曰慈</strong></p>
<p class="explanation">第一是慈愛，對人寬容與善良，心懷仁慈。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>二曰儉</strong></p>
<p class="explanation">第二是儉樸，生活節制，避免奢侈與浪費。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>三曰不敢為天下先</strong></p>
<p class="explanation">第三是不爭先，不爭功名利祿，順其自然，保持謙卑。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第六十七章提出三寶：慈、儉、不敢為天下先。強調仁愛、節制與謙遜，提醒人們在生活與治理中保持內心平和與德行，順應自然而不爭奪。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
