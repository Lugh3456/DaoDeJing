<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 77</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 77</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
天之道，利而不害；聖人之道，為而不爭。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>天之道，利而不害</strong></p>
<p class="explanation">自然的法則造福萬物而不傷害它們，天地運行無私無爭。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>聖人之道，為而不爭</strong></p>
<p class="explanation">聖人的行為順應自然法則，做好事而不爭名奪利，以無爭達致和諧。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第七十七章告訴我們，效法天道、行事不爭，是達致長久和諧的智慧。順應自然、行善無爭，才能真正利人利己。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
