<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 26</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 26</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
重為輕根，靜為躁君。是以聖人終日行不離輜重。雖有榮觀，燕處超然。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>重為輕根</strong></p>
<p class="explanation">穩重是輕盈的根基，凡事穩重才能不偏離平衡。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>靜為躁君</strong></p>
<p class="explanation">心境靜定能控制躁動與衝動，靜是治理心性的關鍵。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>聖人終日行不離輜重</strong></p>
<p class="explanation">聖人行事謹慎穩重，不輕率，即使日常生活也保持穩健。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>雖有榮觀，燕處超然</strong></p>
<p class="explanation">即便身處榮華富貴之中，也能保持超然、不為外物所動。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第二十六章提醒我們穩重與寧靜的重要性。穩重是行事的根基，靜定是控制心性的力量。聖人即便面對榮華，也能保持內心的超然和平衡，順應自然法則。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
