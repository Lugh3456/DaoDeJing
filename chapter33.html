<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 33</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 33</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
知人者智，自知者明。勝人者有力，自勝者強。知足者富，強行者有志。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>知人者智，自知者明</strong></p>
<p class="explanation">能了解別人的人是智慧的，能認識自己的人才是真正明智。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>勝人者有力，自勝者強</strong></p>
<p class="explanation">能戰勝他人的人有力量，但能克服自己內心的人才是真正強大。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>知足者富，強行者有志</strong></p>
<p class="explanation">懂得知足的人內心富足，而有志氣的人則有毅力與決心。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第三十三章教導我們認識自己比征服他人更重要。智慧來自自知，力量來自自勝。懂得知足能讓人內心富足，而堅定目標和意志則是成就事業的關鍵。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
