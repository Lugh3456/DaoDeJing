<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 43</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 43</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
天下之至柔，馳騁天下之至堅。無有入無間，吾是以知無為之有益。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>天下之至柔，馳騁天下之至堅</strong></p>
<p class="explanation">世上最柔弱的力量，可以穿透最堅硬的障礙，象徵柔能克剛。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>無有入無間</strong></p>
<p class="explanation">柔弱之力可以進入最細微的縫隙，無所不能滲透。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>吾是以知無為之有益</strong></p>
<p class="explanation">因此，我明白無為而順應自然，反而能帶來最大的效果和利益。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第四十三章強調柔弱的力量勝於剛強，透過順應自然、不強求的無為之道，反而能達成真正的效益。這提醒我們，柔和、謙遜與順勢，是處世與成事的智慧。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
