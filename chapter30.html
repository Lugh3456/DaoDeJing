<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 30</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 30</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
以道佐人主者，不以兵強天下。吾言甚易知，甚易行。天下莫能知，吾言甚微。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>以道佐人主者，不以兵強天下</strong></p>
<p class="explanation">治理國家的人若依循道的原則，不需要依靠軍事力量或暴力來強制控制。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>吾言甚易知，甚易行</strong></p>
<p class="explanation">道的智慧簡單明瞭，人人都能理解並實踐。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>天下莫能知，吾言甚微</strong></p>
<p class="explanation">然而世人往往無法真正理解道的深意，看似簡單的話語，其實內涵極微妙。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第三十章強調治理與力量的平衡。真正的領導應依循道，避免使用武力或強制。道理簡單，但深遠，智慧者以柔克剛，順應自然，能讓天下安定。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
