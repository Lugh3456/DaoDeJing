<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 38</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 38</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
上德不德，是以有德；下德不失德，是以無德。上德無為而無以為，  
下德有為而有以為。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>上德不德，是以有德</strong></p>
<p class="explanation">真正的高尚德行看似不刻意追求德行，反而自然表現出德。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>下德不失德，是以無德</strong></p>
<p class="explanation">低層次的德行雖然能守住道德，但仍顯得有刻意和拘束，缺乏自然。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>上德無為而無以為</strong></p>
<p class="explanation">高尚的人不強求行為，無為而自然成就。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>下德有為而有以為</strong></p>
<p class="explanation">低層次的人努力做事，但常常為了得到名聲和成就。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第三十八章闡述了“德”的層次。高德者無為而自然成就，低德者努力而刻意表現。真正的德來自內在的自然，而非外在強求，教導我們修身應順其自然。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
