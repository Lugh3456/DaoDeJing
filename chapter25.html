<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 25</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 25</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
有物混成，先天地生。寂兮寥兮，獨立而不改，周行而不殆，可為天下母。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>有物混成，先天地生</strong></p>
<p class="explanation">有一個原始的混沌之物，早於天地而存在，是萬物之源。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>寂兮寥兮，獨立而不改</strong></p>
<p class="explanation">它安靜寂寥，獨立存在，不受外界干擾與改變。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>周行而不殆</strong></p>
<p class="explanation">它運行周遍而不疲倦，持續而穩定，支撐萬物生長。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>可為天下母</strong></p>
<p class="explanation">這原始之物可成為天下萬物之母，孕育與滋養一切。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第二十五章描述了道的原始與混沌特質，強調道是天地萬物的母體。它安靜、穩定、持續不變，孕育萬物。理解道的本源，有助於我們感受宇宙運行的自然與深遠。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
