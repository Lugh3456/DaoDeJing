<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 79</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 79</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
絕聖棄智，民利百倍；絕仁棄義，民復孝慈。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>絕聖棄智，民利百倍</strong></p>
<p class="explanation">放棄過度聰明和聖賢的智慧，反而能讓百姓獲益更多，簡化生活，回歸自然。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>絕仁棄義，民復孝慈</strong></p>
<p class="explanation">放下過度的人為仁義規範，百姓會自然恢復孝順與慈愛的本性。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第七十九章說明，過度的人為規範和智慧可能適得其反。順應自然，讓百姓回歸本性，才會真正和諧與善良。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
