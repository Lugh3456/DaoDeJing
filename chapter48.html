<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 48</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 48</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
為學日益，為道日損。損之又損，以至於無為。無為而無不為。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>為學日益，為道日損</strong></p>
<p class="explanation">學習知識日益增加，但修道則是日益減少私欲與執念，越減越接近本真。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>損之又損，以至於無為</strong></p>
<p class="explanation">持續去除多餘與雜念，最終達到無為而自然而然的境界。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>無為而無不為</strong></p>
<p class="explanation">在無為中反而能完成萬事，順應自然而行，比刻意強求更有效。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第四十八章教導我們修道的智慧：修學問是增加知識，修道則是減少私欲與執念。通過不斷減少，人可達到無為而萬事自然成就的境界，這是道的最高表現。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
