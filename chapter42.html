<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 42</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 42</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
道生一，一生二，二生三，三生萬物。萬物負陰而抱陽，沖氣以為和。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>道生一，一生二，二生三，三生萬物</strong></p>
<p class="explanation">大道產生「一」，一產生二，二產生三，三又生萬物，描述宇宙生成的過程。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>萬物負陰而抱陽，沖氣以為和</strong></p>
<p class="explanation">萬物承受陰面而抱持陽面，通過陰陽互動達到和諧，表現出宇宙運行的自然法則。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第四十二章揭示宇宙生成的順序與陰陽和諧之道。從道到一、二、三，再到萬物，萬物皆由陰陽互動形成平衡。這提醒我們，順應自然法則、理解陰陽互補，是生活與修身的重要智慧。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
