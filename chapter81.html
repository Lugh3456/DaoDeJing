<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 81</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 81</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
信言不美，美言不信。善者不辯，辯者不善。知者不博，博者不知。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>信言不美，美言不信</strong></p>
<p class="explanation">真實誠信的話語往往樸素，不華麗；華麗的言辭反而可能不真實。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>善者不辯，辯者不善</strong></p>
<p class="explanation">真正有德之人不必爭辯，爭辯的人往往心中不善，強調以德服人而非言辭。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>知者不博，博者不知</strong></p>
<p class="explanation">真正智慧的人不追求博學，而博學者未必真正理解，說明知識與智慧不同。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第八十一章作為全書收尾，強調誠實、簡樸與德行的重要。言行樸實、以德服人、追求智慧而非炫知，才是道的真諦。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
