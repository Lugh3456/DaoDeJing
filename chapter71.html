<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 71</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 71</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
知不知，上；不知知，病。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>知不知，上</strong></p>
<p class="explanation">能夠明白自己不完全了解的人，才是真正智慧的人。他們謙遜而開放，不自滿。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>不知知，病</strong></p>
<p class="explanation">認為自己什麼都懂的人，反而容易犯錯。對自己的無知沒有認知，才是問題所在。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第七十一章告訴我們智慧的本質是認知自己的局限。謙遜地承認不完全了解，才能持續成長；自以為全知，則容易陷入困境。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
