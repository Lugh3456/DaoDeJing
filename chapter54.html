<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 54</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 54</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
善建者不拔，善抱者不脫，子孫以祭祀不輟。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>善建者不拔</strong></p>
<p class="explanation">善於建設的人，其成就牢固，不會輕易崩壞。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>善抱者不脫</strong></p>
<p class="explanation">善於守護與承載的人，能長久保持，不輕易失去。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>子孫以祭祀不輟</strong></p>
<p class="explanation">子孫對祖先的尊敬與祭祀不斷，象徵善的延續與傳承。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第五十四章說明穩固與傳承的重要：建設與守護必須堅定，善的事物才能長久延續。提醒我們重視根基與德行，讓良善世代相傳。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
