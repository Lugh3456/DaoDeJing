<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 52</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 52</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
道生一，一生二，二生三，三生萬物。萬物負陰而抱陽，沖氣以為和。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>道生一，一生二，二生三，三生萬物</strong></p>
<p class="explanation">道生萬物的順序：道先生一，然後一生二，二生三，三生萬物，描述宇宙生成循環。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>萬物負陰而抱陽，沖氣以為和</strong></p>
<p class="explanation">萬物承陰抱陽，陰陽相互作用，通過氣的調和而達到自然平衡。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第五十二章說明宇宙生成之道：萬物皆由道而生，陰陽相互依存，氣流調和，形成自然秩序。提醒我們理解天地萬物的運行規律，尊重自然與平衡。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
