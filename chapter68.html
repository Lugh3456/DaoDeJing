<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 68</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 68</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
善為士者不武；善戰者不怒；善勝敵者不與；善用人者為之下。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>善為士者不武</strong></p>
<p class="explanation">真正有智慧的人，不依靠武力來顯示自己的力量，而是以柔克剛。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>善戰者不怒</strong></p>
<p class="explanation">善於應對困境的人不輕易動怒，而是冷靜策略，保持清明心態。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>善勝敵者不與</strong></p>
<p class="explanation">真正能戰勝對手的人，不必正面交鋒，而是以智慧和謀略達到目的。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>善用人者為之下</strong></p>
<p class="explanation">善於使用他人的人會謙下，不居高臨下，讓對方發揮所長，形成和諧合作。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第六十八章強調謙下、冷靜與智慧的重要。無論是武力、競爭還是用人，都不追求顯赫與強勢，而是以柔和謙遜、策略與包容達成最終的勝利。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
