<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 45</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
大成若缺，其用不弊；大盈若沖，其用不窮；大直若屈，大巧若拙，大辯若訥。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>大成若缺，其用不弊</strong></p>
<p class="explanation">真正的圓滿似乎有缺陷，但其效用不會耗盡，表現自然之道。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>大盈若沖，其用不窮</strong></p>
<p class="explanation">最充盈的東西看似空虛，但實際上永不枯竭，顯示虛實的智慧。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>大直若屈，大巧若拙，大辯若訥</strong></p>
<p class="explanation">真正正直的人似乎彎曲，最巧妙的人似乎笨拙，最善辯的人似乎口拙。這是道的表現。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第四十五章教導我們大道之理：真正的智慧與力量不必張揚，圓滿似缺、充盈似虛、巧妙似拙、正直似彎，這提醒我們在生活中應謙遜內斂，以柔克剛。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
