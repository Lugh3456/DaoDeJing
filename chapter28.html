<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 28</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 28</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
知其雄，守其雌，為天下溪。為天下溪，常德不離，復歸於嬰兒。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>知其雄，守其雌</strong></p>
<p class="explanation">明白剛強的一面，但保持柔弱，柔弱能包容、守護。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>為天下溪</strong></p>
<p class="explanation">如溪流般包容低處，滋養萬物而不爭高位。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>常德不離</strong></p>
<p class="explanation">保持本心與德行不偏離，行為符合自然法則。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>復歸於嬰兒</strong></p>
<p class="explanation">回歸純真無邪，如嬰兒般純粹與單純。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第二十八章教導柔弱勝剛強的重要性。順應自然、保持謙卑、如溪流般滋養萬物，回歸純真本性，才能真正擁有道的智慧與力量。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
