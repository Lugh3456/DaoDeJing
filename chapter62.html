<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 62</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 62</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
道者，萬物之奧。善人之寶，不善人之所保。美言可以市尊；美行可以市信。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>道者，萬物之奧</strong></p>
<p class="explanation">道是萬物的本源和深奧之理，是一切存在的奧秘所在。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>善人之寶，不善人之所保</strong></p>
<p class="explanation">對於心地善良的人，道是珍寶；對於不善之人，道仍是保護之源，只是理解方式不同。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>美言可以市尊；美行可以市信</strong></p>
<p class="explanation">美好的言語可以贏得尊敬，美好的行為則能獲得信任和可靠。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第六十二章告訴我們，道是萬物的奧秘，對善人是寶貴的指引，對不善的人也是守護。言行的美好能帶來尊重與信任，提醒我們日常生活中保持善良和謹慎的重要性。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
