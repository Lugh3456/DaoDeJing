<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dao De Jing - Chapter 69</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="chapter-header">
<h1>Chapter 69</h1>
<a href="index.html" class="back-link">← Back to Home</a>
</header>

<main class="chapter-container">

<section class="full-text">
<p id="chineseText">
天下莫柔弱於水，而攻堅強者莫之能勝。以其無以易之。
</p>
<button onclick="speak(document.getElementById('chineseText').innerText)" class="read-btn">
  🔊 誦讀全文
</button>
</section>

<section class="line-explanation">
<h2>逐句解釋</h2>

<div class="explanation-card">
<p class="line"><strong>天下莫柔弱於水</strong></p>
<p class="explanation">世上最柔弱的東西莫過於水，看似柔弱，卻能潤物無聲。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>而攻堅強者莫之能勝</strong></p>
<p class="explanation">水雖柔，卻能攻堅克剛，長久流動可以穿石，象徵柔勝剛。</p>
</div>

<div class="explanation-card">
<p class="line"><strong>以其無以易之</strong></p>
<p class="explanation">因為水不爭不強，對剛強之物而言不可替代，這正是它強大的原因。</p>
</div>

</section>

<section class="summary">
<h2>章節精髓</h2>
<p>
第六十九章以水為比喻，說明柔弱勝剛強的智慧。柔順與不爭，長期累積卻能成就強大力量，提醒我們以謙和與耐心面對挑戰。
</p>
</section>

</main>

<script>
function speak(text) {
  const synth = window.speechSynthesis;
  function loadAndSpeak() {
    const voices = synth.getVoices();
    const tingTing = voices.find(v => v.name.includes("Ting") && v.lang === "zh-CN");
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "zh-CN";
    if (tingTing) msg.voice = tingTing;
    msg.rate = 0.9; msg.pitch = 1;
    synth.speak(msg);
  }
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadAndSpeak;
  } else {
    loadAndSpeak();
  }
}
</script>

</body>
</html>
